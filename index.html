<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Météo Shine</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0a0a0a; color: white; padding: 40px; }
    .weather-section { max-width: 1100px; margin: 0 auto; }
    .ai-reco {
      background: linear-gradient(135deg, #22d3f2, #a3f542); 
      color: black; padding: 25px; border-radius: 12px; text-align: center; margin: 30px 0;
    }
    .weather-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 15px;
    }
    .weather-card {
      background: #1a1a1a; padding: 20px; border-radius: 10px; text-align: center;
    }
    .best { border: 2px solid #a3f542; }
  </style>
</head>
<body>

  <div class="weather-section">
    <h1>MÉTÉO & RECOMMANDATION IA</h1>
    <p>Analyse en temps réel pour Sherbrooke</p>

    <div class="ai-reco">
      <strong>✦ INTELLIGENCE ARTIFICIELLE SHINE</strong><br><br>
      <strong>Meilleur jour recommandé :</strong><br>
      <span id="ai-day" style="font-size:24px;">Chargement...</span><br>
      <span id="ai-reason"></span>
    </div>

    <div class="weather-grid" id="weather-grid"></div>
  </div>

  <script>
    const API_KEY = "c23a73717b8c4e49a19222057260205";
    const LAT = 45.40;
    const LON = -71.89;

    async function loadWeather() {
      try {
        const url = `https://api.openweathermap.org/data/2.5/forecast?lat=${LAT}&lon=${LON}&appid=${API_KEY}&units=metric&lang=fr`;
        const res = await fetch(url);
        const data = await res.json();

        const daily = groupByDay(data.list);
        renderCards(daily);
        renderBestDay(daily);
      } catch(e) {
        document.getElementById('ai-reason').textContent = "Erreur de chargement";
      }
    }

    function groupByDay(list) { /* même fonction que avant */ 
      const days = {};
      list.forEach(item => {
        const date = new Date(item.dt * 1000);
        const key = date.toISOString().split('T')[0];
        if (!days[key]) {
          days[key] = {
            dayName: date.toLocaleDateString('fr-CA', {weekday: 'short'}),
            temp: Math.round(item.main.temp),
            rain: Math.round((item.pop || 0) * 100),
            icon: item.weather[0].icon
          };
        }
      });
      return Object.values(days).slice(0,6);
    }

    function renderCards(days) {
      const container = document.getElementById('weather-grid');
      container.innerHTML = days.map(day => `
        <div class="weather-card ${day.rain < 20 ? 'best' : ''}">
          <b>${day.dayName}</b><br>
          <img src="https://openweathermap.org/img/wn/${day.icon}@2x.png"><br>
          ${day.temp}°C • 💧 ${day.rain}%
        </div>
      `).join('');
    }

    function renderBestDay(days) {
      let best = days[0];
      days.forEach(d => {
        if ((100 - d.rain) + d.temp > (100 - best.rain) + best.temp) best = d;
      });
      document.getElementById('ai-day').textContent = best.dayName + " - " + best.temp + "°C";
      document.getElementById('ai-reason').textContent = "Conditions idéales pour un lavage !";
    }

    loadWeather();
  </script>
</body>
</html>
