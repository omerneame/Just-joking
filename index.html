:root {
  --bg: #0f0f11;
  --surface: #18181c;
  --surface2: #222228;
  --border: #2e2e38;
  --accent: #c8a96e;
  --accent2: #7c6aaa;
  --text: #e8e6e0;
  --muted: #7a7880;
  --danger: #c25f5f;
  --green: #6aaa7c;
  --radius: 12px;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* HEADER */
header {
  padding: 24px 32px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface);
}
header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 1.7rem;
  color: var(--accent);
  letter-spacing: 0.02em;
}
header .subtitle {
  font-size: 0.78rem;
  color: var(--muted);
  margin-top: 2px;
}
.btn-add {
  background: var(--accent);
  color: #0f0f11;
  border: none;
  border-radius: 8px;
  padding: 10px 22px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.15s;
}
.btn-add:hover { opacity: 0.88; transform: translateY(-1px); }

/* TABS */
.tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  padding: 0 32px;
}
.tab {
  padding: 12px 24px;
  cursor: pointer;
  font-size: 0.88rem;
  color: var(--muted);
  border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
  user-select: none;
}
.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}
.tab:hover:not(.active) { color: var(--text); }

/* MAIN LAYOUT */
main {
  flex: 1;
  padding: 28px 32px;
  max-width: 1100px;
  width: 100%;
  margin: 0 auto;
}

/* ===== CALENDAR VIEW ===== */
#view-calendar { display: none; }
#view-calendar.active { display: block; }

.cal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.cal-month {
  font-family: 'Playfair Display', serif;
  font-size: 1.35rem;
  color: var(--text);
  text-transform: capitalize;
}
.cal-nav {
  display: flex;
  gap: 8px;
}
.cal-nav button {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 8px;
  width: 36px; height: 36px;
  cursor: pointer;
  font-size: 1rem;
  transition: background 0.15s;
}
.cal-nav button:hover { background: var(--border); }

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}
.cal-day-name {
  text-align: center;
  font-size: 0.72rem;
  color: var(--muted);
  padding: 6px 0;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.cal-cell {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  min-height: 80px;
  padding: 6px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  position: relative;
}
.cal-cell:hover { border-color: var(--accent); background: var(--surface2); }
.cal-cell.other-month { opacity: 0.35; }
.cal-cell.today {
  border-color: var(--accent2);
  background: rgba(124, 106, 170, 0.1);
}
.cal-day-num {
  font-size: 0.8rem;
  color: var(--muted);
  font-weight: 500;
}
.cal-cell.today .cal-day-num {
  color: var(--accent2);
  font-weight: 700;
}
.cal-rdv-dot {
  margin-top: 4px;
  font-size: 0.7rem;
  background: var(--accent);
  color: #0f0f11;
  border-radius: 4px;
  padding: 1px 5px;
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
  display: block;
}
.cal-rdv-dot.cat-perso { background: var(--accent2); color: #fff; }
.cal-rdv-dot.cat-medical { background: var(--green); color: #0f0f11; }
.cal-rdv-dot.cat-travail { background: #6aaec8; color: #0f0f11; }
.cal-rdv-dot.cat-autre { background: var(--muted); color: #0f0f11; }

/* ===== LIST VIEW ===== */
#view-list { display: none; }
#view-list.active { display: block; }

.list-filters {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
  align-items: center;
}
.filter-input {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 8px;
  padding: 8px 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.88rem;
  outline: none;
  transition: border-color 0.15s;
}
.filter-input:focus { border-color: var(--accent); }
.filter-input::placeholder { color: var(--muted); }
select.filter-input option { background: var(--surface); }

/* Section header in list */
.list-section-header {
  font-size: 0.72rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  padding: 4px 0 8px;
  margin-top: 8px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 4px;
}
.list-section-header.upcoming { color: var(--accent); }
.list-section-header.past { color: var(--muted); opacity: 0.6; }

.rdv-list { display: flex; flex-direction: column; gap: 8px; }
.rdv-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 18px;
  display: flex;
  align-items: flex-start;
  gap: 14px;
  transition: border-color 0.15s, transform 0.12s, opacity 0.3s;
  animation: fadeIn 0.2s ease;
}
.rdv-card.past-card { opacity: 0.55; }
.rdv-card.checked {
  border-color: var(--green);
  background: rgba(106,170,124,0.07);
}
.rdv-card.removing {
  opacity: 0;
  transform: translateX(30px);
  transition: opacity 0.35s, transform 0.35s;
}
@keyframes fadeIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: translateY(0); } }
.rdv-card:hover { border-color: var(--border); transform: translateX(2px); }

/* Checkbox */
.rdv-checkbox-wrap {
  display: flex;
  align-items: center;
  padding-top: 4px;
  flex-shrink: 0;
}
.rdv-checkbox {
  appearance: none;
  width: 20px; height: 20px;
  border: 2px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  background: var(--surface2);
  transition: border-color 0.15s, background 0.15s;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.rdv-checkbox:checked {
  background: var(--green);
  border-color: var(--green);
}
.rdv-checkbox:checked::after {
  content: '✓';
  position: absolute;
  color: #0f0f11;
  font-size: 0.75rem;
  font-weight: 700;
}
.rdv-checkbox:hover { border-color: var(--green); }

/* Done button */
.btn-done {
  background: var(--green);
  color: #0f0f11;
  border: none;
  border-radius: 7px;
  padding: 5px 12px;
  font-size: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: opacity 0.15s, transform 0.15s;
  white-space: nowrap;
}
.btn-done:hover { opacity: 0.85; transform: scale(1.04); }

.rdv-date-badge {
  background: var(--surface2);
  border-radius: 8px;
  padding: 8px 12px;
  text-align: center;
  min-width: 52px;
  flex-shrink: 0;
}
.rdv-date-day { font-size: 1.4rem; font-weight: 700; color: var(--accent); line-height: 1; }
.rdv-date-month { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
.rdv-info { flex: 1; min-width: 0; }
.rdv-title { font-size: 1rem; font-weight: 500; color: var(--text); }
.rdv-meta { display: flex; gap: 8px; margin-top: 5px; flex-wrap: wrap; align-items: center; }
.rdv-time { font-size: 0.78rem; color: var(--muted); }
.rdv-service-tag {
  font-size: 0.68rem;
  padding: 2px 8px;
  border-radius: 20px;
  font-weight: 500;
  background: rgba(34,211,242,0.1);
  color: #6aaec8;
  max-width: 200px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.rdv-cat {
  font-size: 0.68rem;
  padding: 2px 8px;
  border-radius: 20px;
  font-weight: 500;
  background: rgba(200,169,110,0.15);

}
.rdv-cat.cat-perso { background: rgba(124,106,170,0.15); color: var(--accent2); }
.rdv-cat.cat-medical { background: rgba(106,170,124,0.15); color: var(--green); }
.rdv-cat.cat-travail { background: rgba(106,174,200,0.15); color: #6aaec8; }
.rdv-cat.cat-autre { background: rgba(122,120,128,0.15); color: var(--muted); }
.rdv-notes { font-size: 0.78rem; color: var(--muted); margin-top: 5px; white-space: pre-wrap; }
.rdv-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
.btn-icon {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: 7px;
  width: 30px; height: 30px;
  cursor: pointer;
  font-size: 0.85rem;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, color 0.15s;
}
.btn-icon:hover { background: var(--border); color: var(--text); }
.btn-icon.danger:hover { background: rgba(194,95,95,0.15); color: var(--danger); border-color: var(--danger); }

.empty-state {
  text-align: center;
  padding: 64px 24px;

}
.empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.5; }
.empty-state p { font-size: 0.9rem; }

/* ===== MODAL ===== */

<script>
  // ---- STORAGE ----
  const STORAGE_KEY = 'mon_agenda_rdvs';
  let rdvs = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  let editingId = null;
  let currentYear, currentMonth;

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(rdvs));
  }

  // ---- TABS ----
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (tab === 'calendar' && i === 0) || (tab === 'list' && i === 1)));
    document.getElementById('view-calendar').classList.toggle('active', tab === 'calendar');
    document.getElementById('view-list').classList.toggle('active', tab === 'list');
    if (tab === 'calendar') renderCalendar();
    else renderList();
  }

  // ---- CALENDAR ----
  const MONTHS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const DAYS = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];

  function initCalendar() {
    const now = new Date();
    currentYear = now.getFullYear();
    currentMonth = now.getMonth();
    renderCalendar();
  }

  function changeMonth(dir) {
    currentMonth += dir;
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    renderCalendar();
  }

  function renderCalendar() {
    document.getElementById('cal-month-label').textContent = `${MONTHS[currentMonth]} ${currentYear}`;
    const grid = document.getElementById('cal-grid');
    grid.innerHTML = '';
    DAYS.forEach(d => {
      const el = document.createElement('div');
      el.className = 'cal-day-name';
      el.textContent = d;
      grid.appendChild(el);
    });

    const firstDay = new Date(currentYear, currentMonth, 1);
    const lastDay = new Date(currentYear, currentMonth + 1, 0);
    const startDow = (firstDay.getDay() + 6) % 7; // Monday-based
    const today = new Date(); today.setHours(0,0,0,0);

    // Previous month padding
    for (let i = 0; i < startDow; i++) {
      const d = new Date(currentYear, currentMonth, -startDow + 1 + i);
      grid.appendChild(makeCell(d, true));
    }
    // Current month
    for (let d = 1; d <= lastDay.getDate(); d++) {
      const date = new Date(currentYear, currentMonth, d);
      const cell = makeCell(date, false);
      const isToday = date.getTime() === today.getTime();
      if (isToday) cell.classList.add('today');
      grid.appendChild(cell);
    }
    // Next month padding
    const remaining = (7 - (startDow + lastDay.getDate()) % 7) % 7;
    for (let i = 1; i <= remaining; i++) {
      const d = new Date(currentYear, currentMonth + 1, i);
      grid.appendChild(makeCell(d, true));
    }
  }

  function makeCell(date, otherMonth) {
    const cell = document.createElement('div');
    cell.className = 'cal-cell' + (otherMonth ? ' other-month' : '');
    const num = document.createElement('div');
    num.className = 'cal-day-num';
    num.textContent = date.getDate();
    cell.appendChild(num);

    const dateStr = toDateStr(date);
    const dayRdvs = rdvs.filter(r => r.date === dateStr).sort((a,b) => (a.time||'').localeCompare(b.time||''));
    dayRdvs.slice(0, 3).forEach(r => {
      const dot = document.createElement('span');
      dot.className = `cal-rdv-dot cat-${r.cat}`;
      dot.textContent = (r.time ? r.time + ' ' : '') + r.title;
      dot.onclick = (e) => { e.stopPropagation(); openModal(r.id); };
      cell.appendChild(dot);
    });
    if (dayRdvs.length > 3) {
      const more = document.createElement('span');
      more.style.cssText = 'font-size:0.65rem;color:var(--muted);display:block;margin-top:2px;';
      more.textContent = `+${dayRdvs.length - 3} de plus`;
      cell.appendChild(more);
    }
    cell.onclick = () => openModal(null, dateStr);
    return cell;
  }

  function toDateStr(date) {
    return date.toISOString().split('T')[0];
  }

  // ---- LIST ----
  let checkedIds = new Set();

  function renderList() {
    const search = document.getElementById('search-input').value.toLowerCase();
    const cat = document.getElementById('filter-cat').value;
    const period = document.getElementById('filter-period').value;
    const today = toDateStr(new Date());

    let list = rdvs.filter(r => {
      if (search && !r.title.toLowerCase().includes(search) && !(r.notes||'').toLowerCase().includes(search) && !(r.lieu||'').toLowerCase().includes(search) && !(r.service||'').toLowerCase().includes(search)) return false;
      if (cat && r.cat !== cat) return false;
      if (period === 'upcoming' && r.date < today) return false;
      if (period === 'past' && r.date >= today) return false;
      return true;
    });
    list.sort((a,b) => (a.date + (a.time||'')).localeCompare(b.date + (b.time||'')));

    const container = document.getElementById('rdv-list');
    if (list.length === 0) {
      container.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>Aucun rendez-vous trouvé.</p></div>`;
      return;
    }

    // Split upcoming vs past
    const upcoming = list.filter(r => r.date >= today);
    const past = list.filter(r => r.date < today);

    let html = '';

    if (upcoming.length > 0) {
      if (period === 'all') html += `<div class="list-section-header upcoming">📅 À venir — ${upcoming.length} rendez-vous</div>`;
      html += upcoming.map(r => makeCardHtml(r, false)).join('');
    }

    if (past.length > 0) {
      if (period === 'all' || period === 'past') html += `<div class="list-section-header past" style="margin-top:16px">🕓 Passés — ${past.length} rendez-vous</div>`;
      html += past.map(r => makeCardHtml(r, true)).join('');
    }

    container.innerHTML = html;

    // Restore checked state
    checkedIds.forEach(id => {
      const card = container.querySelector(`[data-rdv-id="${id}"]`);
      if (card) {
        card.classList.add('checked');
        const cb = card.querySelector('.rdv-checkbox');
        if (cb) cb.checked = true;
        const doneBtn = card.querySelector('.btn-done');
        if (doneBtn) doneBtn.style.display = 'inline-flex';
      }
    });
  }

  function makeCardHtml(r, isPast) {
    const d = new Date(r.date + 'T12:00:00');
    const day = d.getDate();
    const month = MONTHS[d.getMonth()].slice(0,3);
    const catLabel = {professionnel:'Professionnel',perso:'Personnel',medical:'Médical',travail:'Travail',autre:'Autre'}[r.cat]||r.cat;
    const isChecked = checkedIds.has(r.id);
    return `
      <div class="rdv-card${isPast ? ' past-card' : ''}${isChecked ? ' checked' : ''}" data-rdv-id="${r.id}">
        ${!isPast ? `<div class="rdv-checkbox-wrap">
          <input type="checkbox" class="rdv-checkbox" ${isChecked ? 'checked' : ''} onchange="toggleCheck('${r.id}', this)">
        </div>` : ''}
        <div class="rdv-date-badge">
          <div class="rdv-date-day">${day}</div>
          <div class="rdv-date-month">${month}</div>
        </div>
        <div class="rdv-info">
          <div class="rdv-title">${escHtml(r.title)}</div>
          <div class="rdv-meta">
            ${r.time ? `<span class="rdv-time">🕐 ${r.time}${r.duration ? ' · '+r.duration+'min' : ''}</span>` : ''}
            ${r.service ? `<span class="rdv-service-tag">🚗 ${escHtml(r.service)}</span>` : ''}
            ${r.lieu ? `<span class="rdv-time">📍 ${escHtml(r.lieu)}</span>` : ''}
            <span class="rdv-cat cat-${r.cat}">${catLabel}</span>
          </div>
          ${r.notes ? `<div class="rdv-notes">${escHtml(r.notes)}</div>` : ''}
        </div>
        <div class="rdv-actions">
          ${!isPast && isChecked ? `<button class="btn-done" onclick="markDone('${r.id}')">✅ Fait</button>` : ''}
          <button class="btn-icon" onclick="openModal('${r.id}')" title="Modifier">✏️</button>
          <button class="btn-icon danger" onclick="deleteRdv('${r.id}')" title="Supprimer">🗑️</button>
        </div>
      </div>`;
  }

  function toggleCheck(id, checkbox) {
    if (checkbox.checked) {
      checkedIds.add(id);
    } else {
      checkedIds.delete(id);
    }
    renderList();
  }

  function markDone(id) {
    const card = document.querySelector(`[data-rdv-id="${id}"]`);
    if (card) {
      card.classList.add('removing');
      setTimeout(() => {
        checkedIds.delete(id);
        rdvs = rdvs.filter(r => r.id !== id);
        save();
        renderCalendar();
        renderList();
        showToast('✅ Rendez-vous marqué comme fait et retiré.');
      }, 350);
    }
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ---- MODAL ----
  function openModal(id = null, prefillDate = null) {
    editingId = id;
    const rdv = id ? rdvs.find(r => r.id === id) : null;
    document.getElementById('modal-title').textContent = rdv ? 'Modifier le rendez-vous' : 'Nouveau rendez-vous';
    document.getElementById('f-title').value = rdv ? rdv.title : '';
    document.getElementById('f-date').value = rdv ? rdv.date : (prefillDate || toDateStr(new Date()));
    document.getElementById('f-time').value = rdv ? (rdv.time || '') : '';
    document.getElementById('f-duration').value = rdv ? (rdv.duration || '') : '';
    document.getElementById('f-cat').value = rdv ? rdv.cat : 'professionnel';
    document.getElementById('f-service').value = rdv ? (rdv.service || '') : '';
    document.getElementById('f-lieu').value = rdv ? (rdv.lieu || '') : '';
    document.getElementById('f-notes').value = rdv ? (rdv.notes || '') : '';
    document.getElementById('modal-overlay').classList.add('open');
    setTimeout(() => document.getElementById('f-title').focus(), 100);
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    editingId = null;
  }

  function closeModalOnOverlay(e) {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  }

  function saveRdv() {
    const title = document.getElementById('f-title').value.trim();
    const date = document.getElementById('f-date').value;
    if (!title || !date) { showToast('⚠️ Titre et date requis.'); return; }

    const data = {
      id: editingId || Date.now().toString(),
      title,
      date,
      time: document.getElementById('f-time').value,
      duration: document.getElementById('f-duration').value,
      cat: document.getElementById('f-cat').value,
      service: document.getElementById('f-service').value,
      lieu: document.getElementById('f-lieu').value.trim(),
      notes: document.getElementById('f-notes').value.trim(),
    };

    if (editingId) {
      const idx = rdvs.findIndex(r => r.id === editingId);
      rdvs[idx] = data;
      showToast('✅ Rendez-vous modifié.');
    } else {
      rdvs.push(data);
      showToast('✅ Rendez-vous ajouté.');
    }

    save();
    closeModal();
    renderCalendar();
    renderList();
  }

  function deleteRdv(id) {
    if (!confirm('Supprimer ce rendez-vous ?')) return;
    rdvs = rdvs.filter(r => r.id !== id);
    save();
    renderCalendar();
    renderList();
    showToast('🗑️ Rendez-vous supprimé.');
  }

  // ---- TOAST ----
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ---- KEYBOARD ----
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if (e.key === 'Enter' && document.getElementById('modal-overlay').classList.contains('open')) {
      if (e.target.tagName !== 'TEXTAREA') saveRdv();
    }
  });

  // ---- INIT ----
  initCalendar();
</script>

</body>
</html>
