<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Agenda · ShineAutomobile</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #eef1f6;
  --surface: #ffffff;
  --card: #f4f6fa;
  --border: #d8dde8;
  --accent: #1a6ef5;
  --accent2: #0d4ec7;
  --text: #0f172a;
  --muted: #64748b;
  --danger: #dc2626;
  --success: #16a34a;
  --r: 14px;
  --t: 0.18s cubic-bezier(.4,0,.2,1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── HEADER ── */
header {
background: var(–surface);
border-bottom: 1px solid var(–border);
padding: 14px 22px;
display: flex; align-items: center; justify-content: space-between;
position: sticky; top: 0; z-index: 100;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon {
width: 36px; height: 36px;
background: linear-gradient(135deg, var(–accent), var(–accent2));
border-radius: 10px;
display: flex; align-items: center; justify-content: center;
font-size: 17px;
}
.logo-name { font-family: ‘Syne’, sans-serif; font-weight: 700; font-size: 16px; }
.logo-sub { font-size: 10px; color: var(–muted); }
.btn-new {
background: linear-gradient(135deg, var(–accent), var(–accent2));
color: #fff; border: none; border-radius: 8px;
padding: 8px 16px;
font-family: ‘Syne’, sans-serif; font-size: 13px; font-weight: 700;
cursor: pointer; transition: opacity var(–t), transform var(–t);
letter-spacing: .3px;
}
.btn-new:hover { opacity: .85; transform: translateY(-1px); }

/* ── LAYOUT ── */
.main { max-width: 880px; margin: 0 auto; padding: 22px 16px; }

/* ── STATS ── */
.stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 20px; }
.stat {
background: var(–surface); border: 1px solid var(–border);
border-radius: var(–r); padding: 14px; text-align: center;
transition: transform var(–t), border-color var(–t);
}
.stat:hover { transform: translateY(-2px); border-color: rgba(26,110,245,.25); }
.stat-n { font-family: ‘Syne’, sans-serif; font-size: 26px; font-weight: 800; line-height: 1; }
.stat-l { font-size: 10px; color: var(–muted); margin-top: 4px; text-transform: uppercase; letter-spacing: .6px; }

/* ── TABS ── */
.tabs {
display: flex; gap: 3px;
background: var(–surface); border: 1px solid var(–border);
border-radius: var(–r); padding: 4px; margin-bottom: 20px;
}
.tab {
flex: 1; padding: 8px; border: none; background: transparent;
color: var(–muted); font-family: ‘DM Sans’, sans-serif; font-size: 13px;
font-weight: 500; border-radius: 10px; cursor: pointer; transition: all var(–t);
}
.tab.active { background: var(–card); color: var(–text); box-shadow: 0 2px 8px rgba(0,0,0,.08); }
.tab:hover:not(.active) { color: var(–text); }

/* ══ CALENDAR ══ */
.cal-wrap {
background: var(–surface); border: 1px solid var(–border);
border-radius: var(–r); overflow: hidden; margin-bottom: 18px;
}
.cal-nav {
display: flex; align-items: center; justify-content: space-between;
padding: 16px 20px; border-bottom: 1px solid var(–border);
}
.cal-arrow {
width: 34px; height: 34px; border-radius: 9px;
background: var(–card); border: 1px solid var(–border);
color: var(–text); display: flex; align-items: center; justify-content: center;
cursor: pointer; font-size: 18px; transition: all var(–t); user-select: none;
}
.cal-arrow:hover { background: var(–border); transform: scale(1.05); }
.cal-title { text-align: center; }
.cal-month-name {
font-family: ‘Syne’, sans-serif; font-size: 17px; font-weight: 700;
}
.cal-today-link {
font-size: 11px; color: var(–muted); background: none; border: none;
cursor: pointer; font-family: inherit; margin-top: 3px;
transition: color var(–t); display: block;
}
.cal-today-link:hover { color: var(–accent); }

.cal-dow {
display: grid; grid-template-columns: repeat(7,1fr);
padding: 10px 14px 4px;
}
.cal-dow span {
text-align: center; font-size: 10px; font-weight: 600;
color: var(–muted); text-transform: uppercase; letter-spacing: .5px;
}

.cal-grid {
display: grid; grid-template-columns: repeat(7,1fr);
gap: 2px; padding: 8px 14px 14px;
}
.cal-day {
aspect-ratio: 1; border-radius: 10px;
display: flex; flex-direction: column; align-items: center;
justify-content: flex-start; padding: 4px 2px 2px;
cursor: pointer; transition: background var(–t); min-height: 48px;
}
.cal-day:hover { background: var(–card); }
.cal-day.faded { opacity: .2; pointer-events: none; }
.cal-num {
font-size: 13px; width: 26px; height: 26px; border-radius: 50%;
display: flex; align-items: center; justify-content: center;
transition: all var(–t); font-weight: 500; margin-bottom: 2px;
}
.cal-day.is-today .cal-num {
background: linear-gradient(135deg, var(–accent), var(–accent2));
color: #fff; font-weight: 700;
}
.cal-day.is-sel .cal-num {
border: 2px solid var(–accent); color: var(–accent);
}
.cal-day.is-today.is-sel .cal-num {
border: none; box-shadow: 0 0 0 3px rgba(26,110,245,.25);
}
.cal-dots { display: flex; gap: 2px; justify-content: center; }
.cal-dot { width: 4px; height: 4px; border-radius: 50%; background: var(–accent); opacity: .8; }

/* ══ DAY PANEL ══ */
.day-panel { animation: up .18s ease; }
@keyframes up { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

/* ══ APPOINTMENT CARDS ══ */
.section-label {
font-size: 10px; font-weight: 600; color: var(–muted);
text-transform: uppercase; letter-spacing: .8px;
margin: 16px 0 8px;
}

.apt {
background: var(–surface); border: 1px solid var(–border);
border-radius: var(–r); display: flex; align-items: stretch;
margin-bottom: 7px; overflow: hidden;
transition: border-color var(–t), transform var(–t), opacity var(–t), max-height .3s ease;
}
.apt:hover { border-color: rgba(26,110,245,.3); transform: translateX(2px); }
.apt-stripe { width: 4px; flex-shrink: 0; background: linear-gradient(180deg, var(–accent), var(–accent2)); }
.apt-body { display: flex; align-items: center; gap: 11px; padding: 12px 14px; flex: 1; min-width: 0; }

/* Hook button */
.hook {
position: relative; flex-shrink: 0;
}
.hook-btn {
width: 30px; height: 30px; border-radius: 50%;
background: var(–card); border: 1px solid var(–border);
color: var(–muted); font-size: 15px;
display: flex; align-items: center; justify-content: center;
cursor: pointer; transition: all var(–t);
}
.hook-btn:hover, .hook-btn.open { background: var(–accent); color: #fff; border-color: var(–accent); }

/* Dropdown */
.drop {
position: absolute; left: 0; top: 36px;
background: var(–card); border: 1px solid var(–border);
border-radius: 11px; min-width: 158px;
box-shadow: 0 8px 24px rgba(0,0,0,.12);
z-index: 60; overflow: hidden;
opacity: 0; transform: translateY(-5px) scale(.95);
pointer-events: none;
transition: opacity .15s ease, transform .15s ease;
}
.drop.show { opacity: 1; transform: none; pointer-events: all; }
.drop-item {
display: flex; align-items: center; gap: 8px;
padding: 10px 13px; font-size: 13px;
background: none; border: none; color: var(–text);
width: 100%; cursor: pointer; transition: background var(–t);
font-family: inherit; text-align: left;
}
.drop-item:hover { background: var(–border); }
.drop-item.danger { color: var(–danger); }
.drop-item.success { color: var(–success); }
.drop-sep { height: 1px; background: var(–border); }

/* Info */
.apt-info { flex: 1; min-width: 0; }
.apt-name { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
.apt-meta { font-size: 11px; color: var(–muted); }

/* Transitions */
.apt.done { opacity: 0; transform: translateX(18px); transition: opacity .35s ease, transform .35s ease; }
.apt.gone { opacity: 0; max-height: 0 !important; margin: 0; overflow: hidden; transition: opacity .3s ease, max-height .35s ease, margin .35s ease; }

/* ══ FILTERS ══ */
.filters { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
.chip {
background: var(–surface); border: 1px solid var(–border);
color: var(–muted); border-radius: 20px; padding: 5px 12px;
font-family: inherit; font-size: 12px; cursor: pointer; transition: all var(–t);
}
.chip.active { border-color: var(–accent); color: var(–accent); background: rgba(26,110,245,.07); }
.chip:hover:not(.active) { color: var(–text); }

/* ══ EMPTY ══ */
.empty { text-align: center; padding: 36px 20px; color: var(–muted); }
.empty-icon { font-size: 32px; margin-bottom: 8px; }
.empty-title { font-size: 14px; color: var(–text); margin-bottom: 3px; }
.empty-add { background: none; border: none; color: var(–accent); cursor: pointer; font-family: inherit; font-size: 12px; }

/* ══ MODAL ══ */
.overlay {
position: fixed; inset: 0; background: rgba(15,23,42,.45);
backdrop-filter: blur(6px); z-index: 200;
display: flex; align-items: center; justify-content: center; padding: 18px;
opacity: 0; pointer-events: none; transition: opacity .2s ease;
}
.overlay.open { opacity: 1; pointer-events: all; }
.modal {
background: var(–surface); border: 1px solid var(–border);
border-radius: 18px; width: 100%; max-width: 450px;
max-height: 92vh; overflow-y: auto; padding: 24px;
transform: translateY(16px) scale(.97);
transition: transform .22s cubic-bezier(.4,0,.2,1);
}
.overlay.open .modal { transform: none; }

.modal-head { display: flex; align-items: center; margin-bottom: 20px; gap: 10px; }
.modal-ttl { font-family: ‘Syne’, sans-serif; font-size: 19px; font-weight: 700; flex: 1; }
.modal-x {
width: 30px; height: 30px; border-radius: 7px;
background: var(–card); border: 1px solid var(–border);
color: var(–muted); display: flex; align-items: center; justify-content: center;
cursor: pointer; font-size: 16px; transition: all var(–t);
}
.modal-x:hover { background: var(–danger); color: #fff; border-color: var(–danger); }

.fg { margin-bottom: 12px; }
.fl { font-size: 10px; font-weight: 600; color: var(–muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 5px; display: block; }
.fi, .fs, .fta {
width: 100%; background: var(–card); border: 1px solid var(–border);
border-radius: 8px; color: var(–text); font-family: inherit;
font-size: 13px; padding: 10px 12px; outline: none;
transition: border-color var(–t);
}
.fi:focus, .fs:focus, .fta:focus { border-color: var(–accent); }
.fs option { background: #fff; color: var(–text); }
.fta { resize: vertical; min-height: 68px; }
.frow { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-btns { display: flex; gap: 8px; margin-top: 18px; }
.btn-cancel {
flex: 1; background: var(–card); border: 1px solid var(–border);
color: var(–muted); border-radius: 8px; padding: 10px;
font-family: inherit; font-size: 13px; cursor: pointer; transition: all var(–t);
}
.btn-cancel:hover { color: var(–text); }
.btn-save {
flex: 2; background: linear-gradient(135deg, var(–accent), var(–accent2));
border: none; color: #fff; border-radius: 8px; padding: 10px;
font-family: ‘Syne’, sans-serif; font-size: 14px; font-weight: 700;
cursor: pointer; transition: opacity var(–t);
}
.btn-save:hover { opacity: .87; }

@media (max-width: 580px) {
.stats { grid-template-columns: repeat(2,1fr); }
.frow { grid-template-columns: 1fr; }
.cal-day { min-height: 38px; }
}
</style>

</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🚗</div>
    <div>
      <div class="logo-name">Mon Agenda</div>
      <div class="logo-sub">ShineAutomobile</div>
    </div>
  </div>
  <button class="btn-new" onclick="openModal()">＋ Nouveau</button>
</header>

<div class="main">

  <!-- Stats -->

  <div class="stats">
    <div class="stat"><div class="stat-n" id="s-total">0</div><div class="stat-l">📅 Total</div></div>
    <div class="stat"><div class="stat-n" id="s-future">0</div><div class="stat-l">✅ À venir</div></div>
    <div class="stat"><div class="stat-n" id="s-today">0</div><div class="stat-l">📆 Aujourd'hui</div></div>
    <div class="stat"><div class="stat-n" id="s-past">0</div><div class="stat-l">🕓 Passés</div></div>
  </div>

  <!-- Tabs -->

  <div class="tabs">
    <button class="tab active" onclick="tab('cal',this)">📆 Calendrier</button>
    <button class="tab" onclick="tab('list',this)">📋 Liste</button>
  </div>

  <!-- Calendar View -->

  <div id="v-cal">
    <div class="cal-wrap">
      <div class="cal-nav">
        <div class="cal-arrow" onclick="changeMonth(-1)">‹</div>
        <div class="cal-title">
          <div class="cal-month-name" id="cal-label"></div>
          <button class="cal-today-link" onclick="goToday()">Aujourd'hui</button>
        </div>
        <div class="cal-arrow" onclick="changeMonth(1)">›</div>
      </div>
      <div class="cal-dow">
        <span>Dim</span><span>Lun</span><span>Mar</span>
        <span>Mer</span><span>Jeu</span><span>Ven</span><span>Sam</span>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
    <div id="day-panel"></div>
  </div>

  <!-- List View -->

  <div id="v-list" style="display:none">
    <div class="filters">
      <button class="chip active" onclick="setFilter('all',this)">🔄 Tous</button>
      <button class="chip" onclick="setFilter('future',this)">📅 À venir</button>
      <button class="chip" onclick="setFilter('past',this)">🕓 Passés</button>
    </div>
    <div id="apt-list"></div>
  </div>

</div>

<!-- Modal -->

<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-ttl" id="modal-ttl">Nouveau rendez-vous</div>
      <div class="modal-x" onclick="closeModal()">✕</div>
    </div>
    <div class="fg">
      <label class="fl">👤 Client *</label>
      <input class="fi" id="f-name" placeholder="Nom du client">
    </div>
    <div class="fg">
      <label class="fl">🚗 Service</label>
      <select class="fs" id="f-service">
        <option value="">— Aucun —</option>
        <optgroup label="SUV / VUS">
          <option>Extérieur Régulier – SUV</option>
          <option>Extérieur Premium – SUV</option>
          <option>Complet Régulier – SUV</option>
          <option>Complet Premium – SUV</option>
          <option>Complet Deluxe – SUV</option>
        </optgroup>
        <optgroup label="Berline">
          <option>Extérieur Régulier – Berline</option>
          <option>Extérieur Premium – Berline</option>
          <option>Complet Régulier – Berline</option>
          <option>Complet Premium – Berline</option>
          <option>Complet Deluxe – Berline</option>
        </optgroup>
        <optgroup label="Urgences">
          <option>🔑 Déverrouillage – 50$</option>
          <option>🔋 Survoltage – 40$</option>
        </optgroup>
        <optgroup label="Flotte">
          <option>Extérieur 2–4 voitures – 30$/voit.</option>
          <option>Complet 2 voitures – 95$/voit.</option>
          <option>Complet 5+ voitures – 80$/voit.</option>
        </optgroup>
      </select>
    </div>
    <div class="frow">
      <div class="fg"><label class="fl">📅 Date *</label><input class="fi" id="f-date" type="date"></div>
      <div class="fg"><label class="fl">🕐 Heure</label><input class="fi" id="f-time" type="time"></div>
    </div>
    <div class="frow">
      <div class="fg"><label class="fl">⏱ Durée (min)</label><input class="fi" id="f-dur" type="number" placeholder="60" min="5" step="5"></div>
      <div class="fg"><label class="fl">📍 Lieu</label><input class="fi" id="f-place" placeholder="Adresse"></div>
    </div>
    <div class="fg">
      <label class="fl">📝 Notes</label>
      <textarea class="fta" id="f-notes" placeholder="Informations supplémentaires…"></textarea>
    </div>
    <div class="form-btns">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-save" onclick="saveApt()">💾 Enregistrer</button>
    </div>
  </div>
</div>

<script>
// ── State ──
let apts = JSON.parse(localStorage.getItem('shine-v3') || '[]');
let editId = null;
let calDate = new Date();
let selDay = new Date().toISOString().slice(0,10);
let filter = 'all';

const MONTHS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

const save = () => localStorage.setItem('shine-v3', JSON.stringify(apts));
const uid  = () => Date.now().toString(36) + Math.random().toString(36).slice(2);
const today = () => new Date().toISOString().slice(0,10);
const fmtDate = ds => {
  const d = new Date(ds + 'T00:00:00');
  return d.toLocaleDateString('fr-CA', {weekday:'long', day:'numeric', month:'long'});
};

// ── Modal ──
function openModal(id = null) {
  editId = id;
  document.getElementById('modal-ttl').textContent = id ? 'Modifier' : 'Nouveau rendez-vous';
  if (id) {
    const a = apts.find(x => x.id === id);
    document.getElementById('f-name').value    = a.name;
    document.getElementById('f-service').value = a.service || '';
    document.getElementById('f-date').value    = a.date;
    document.getElementById('f-time').value    = a.time || '';
    document.getElementById('f-dur').value     = a.dur || '';
    document.getElementById('f-place').value   = a.place || '';
    document.getElementById('f-notes').value   = a.notes || '';
  } else {
    ['f-name','f-time','f-dur','f-place','f-notes'].forEach(i => document.getElementById(i).value = '');
    document.getElementById('f-service').value = '';
    document.getElementById('f-date').value = selDay || today();
  }
  document.getElementById('overlay').classList.add('open');
  document.getElementById('f-name').focus();
}
function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  editId = null;
}
function saveApt() {
  const name = document.getElementById('f-name').value.trim();
  const date = document.getElementById('f-date').value;
  if (!name || !date) { alert('Nom et date requis.'); return; }
  const apt = {
    id: editId || uid(), name, date,
    service: document.getElementById('f-service').value,
    time:    document.getElementById('f-time').value,
    dur:     document.getElementById('f-dur').value,
    place:   document.getElementById('f-place').value,
    notes:   document.getElementById('f-notes').value,
  };
  if (editId) { const i = apts.findIndex(a => a.id === editId); apts[i] = apt; }
  else apts.push(apt);
  save(); closeModal(); renderAll();
}

// ── Actions ──
function del(id) {
  const el = document.getElementById('a-'+id);
  if (!el) return;
  el.classList.add('gone');
  setTimeout(() => { apts = apts.filter(a => a.id !== id); save(); renderAll(); }, 340);
}
function done(id) {
  const el = document.getElementById('a-'+id);
  if (!el) return;
  el.classList.add('done');
  setTimeout(() => { apts = apts.filter(a => a.id !== id); save(); renderAll(); }, 360);
}

let openDrop = null;
function toggleDrop(id) {
  const drop = document.getElementById('d-'+id);
  const btn  = document.getElementById('h-'+id);
  if (openDrop && openDrop !== id) {
    document.getElementById('d-'+openDrop)?.classList.remove('show');
    document.getElementById('h-'+openDrop)?.classList.remove('open');
  }
  const showing = drop.classList.contains('show');
  drop.classList.toggle('show', !showing);
  btn.classList.toggle('open', !showing);
  openDrop = showing ? null : id;
}
document.addEventListener('click', e => {
  if (openDrop && !e.target.closest('.hook')) {
    document.getElementById('d-'+openDrop)?.classList.remove('show');
    document.getElementById('h-'+openDrop)?.classList.remove('open');
    openDrop = null;
  }
});

// ── Card HTML ──
function cardHTML(a) {
  const meta = [
    a.time ? `🕐 ${a.time}${a.dur ? ` · ${a.dur}min` : ''}` : '',
    a.service,
    a.place ? `📍 ${a.place}` : ''
  ].filter(Boolean).join('  ·  ');
  return `
<div class="apt" id="a-${a.id}">
  <div class="apt-stripe"></div>
  <div class="apt-body">
    <div class="hook">
      <button class="hook-btn" id="h-${a.id}" onclick="toggleDrop('${a.id}')">⚓</button>
      <div class="drop" id="d-${a.id}">
        <button class="drop-item" onclick="openModal('${a.id}');toggleDrop('${a.id}')">✏️ Modifier</button>
        <div class="drop-sep"></div>
        <button class="drop-item danger" onclick="del('${a.id}')">🗑 Supprimer</button>
      </div>
    </div>
    <div class="apt-info">
      <div class="apt-name">${a.name}</div>
      ${meta ? `<div class="apt-meta">${meta}</div>` : ''}
    </div>
  </div>
</div>`;
}

// ── Render list ──
function renderList() {
  const t = today();
  let list = [...apts];
  if (filter === 'future') list = list.filter(a => a.date >= t);
  if (filter === 'past')   list = list.filter(a => a.date < t);
  list.sort((a,b) => (a.date+(a.time||'')).localeCompare(b.date+(b.time||'')));
  const el = document.getElementById('apt-list');
  if (!list.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><div class="empty-title">Aucun rendez-vous</div><div><button class="empty-add" onclick="openModal()">＋ Ajouter</button></div></div>`;
    return;
  }
  let html = ''; let last = null;
  list.forEach(a => {
    if (a.date !== last) {
      const lbl = a.date === t ? '📍 Aujourd\'hui' : fmtDate(a.date);
      html += `<div class="section-label">${lbl}</div>`;
      last = a.date;
    }
    html += cardHTML(a);
  });
  el.innerHTML = html;
}

// ── Render day panel ──
function renderDayPanel() {
  const el = document.getElementById('day-panel');
  const t = today();
  const dayApts = apts.filter(a => a.date === selDay).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  const lbl = selDay === t ? '📍 Aujourd\'hui' : fmtDate(selDay);
  if (!dayApts.length) {
    el.innerHTML = `<div class="day-panel"><div class="section-label">${lbl}</div><div class="empty"><div class="empty-icon">📅</div><div class="empty-title">Aucun rendez-vous</div><div><button class="empty-add" onclick="openModal()">＋ Ajouter pour ce jour</button></div></div></div>`;
  } else {
    el.innerHTML = `<div class="day-panel"><div class="section-label">${lbl}</div>${dayApts.map(cardHTML).join('')}</div>`;
  }
}

// ── Stats ──
function renderStats() {
  const t = today();
  document.getElementById('s-total').textContent  = apts.length;
  document.getElementById('s-future').textContent = apts.filter(a => a.date >= t).length;
  document.getElementById('s-today').textContent  = apts.filter(a => a.date === t).length;
  document.getElementById('s-past').textContent   = apts.filter(a => a.date < t).length;
}

// ── Calendar ──
function renderCal() {
  const yr = calDate.getFullYear(), mo = calDate.getMonth();
  document.getElementById('cal-label').textContent = `${MONTHS[mo]} ${yr}`;
  const t = today();
  const firstDow = new Date(yr, mo, 1).getDay();
  const daysInMo = new Date(yr, mo+1, 0).getDate();
  let html = '';

  // Prev month padding
  for (let i = 0; i < firstDow; i++) {
    const d = new Date(yr, mo, 1-(firstDow-i));
    const ds = d.toISOString().slice(0,10);
    html += `<div class="cal-day faded"><span class="cal-num">${d.getDate()}</span></div>`;
  }
  // Current month
  for (let d = 1; d <= daysInMo; d++) {
    const ds = `${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dots = apts.filter(a => a.date === ds);
    let cls = 'cal-day';
    if (ds === t) cls += ' is-today';
    if (ds === selDay) cls += ' is-sel';
    const dotHTML = dots.length ? `<div class="cal-dots">${'<div class="cal-dot"></div>'.repeat(Math.min(dots.length,3))}</div>` : '';
    html += `<div class="${cls}" onclick="selectDay('${ds}')"><span class="cal-num">${d}</span>${dotHTML}</div>`;
  }
  // Next month padding
  const rem = 42 - firstDow - daysInMo;
  for (let d = 1; d <= rem; d++) {
    html += `<div class="cal-day faded"><span class="cal-num">${d}</span></div>`;
  }
  document.getElementById('cal-grid').innerHTML = html;
}

function selectDay(ds) { selDay = ds; renderCal(); renderDayPanel(); }
function changeMonth(dir) { calDate.setMonth(calDate.getMonth()+dir); renderCal(); }
function goToday() { calDate = new Date(); selDay = today(); renderAll(); }

// ── Tabs & Filters ──
function tab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('v-cal').style.display  = name==='cal'  ? 'block' : 'none';
  document.getElementById('v-list').style.display = name==='list' ? 'block' : 'none';
}
function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

// ── Init ──
function renderAll() { renderStats(); renderCal(); renderList(); renderDayPanel(); }
renderAll();
</script>
